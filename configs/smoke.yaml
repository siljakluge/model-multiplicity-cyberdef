experiment_name: nslkdd_smoke
run_dir: runs/nslkdd_smoke

dataset:
  name: nsl_kdd
  raw_dir: data/raw/nsl-kdd
  task: binary
  test_size: 0.2

training:
  seeds: [1, 2]
  subset_fractions: [0.1]
  subset_strategy: stratified
  epochs: 1
  batch_size: 512
  learning_rate: 0.001
  weight_decay: 0.0001
  hidden_dims: [32]
  dropout: 0.1
  patience: 1
  device: cpu
